name: CI

on:
  pull_request:
  push:
    branches: [main]

# contents: write for the coverage-badge push to gh-pages; pages/id-token for the
# Actions Pages deploy invoked via pages.yml.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Unit tests use the app as TEST_HOST and the deployment target is macOS 26,
    # so they must execute on a Tahoe (macOS 26) runner.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Run tests
        run: |
          xcodebuild test \
            -project Orchard.xcodeproj \
            -scheme Orchard \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      # Coverage is scoped to Orchard/Services/ — views are deliberately untested, so a
      # whole-app number would read as neglect. Informational only, not a gate.
      - name: Compute services coverage
        run: |
          mkdir -p badge
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          python3 - <<'EOF'
          import json
          r = json.load(open("coverage.json"))
          files = [f for t in r["targets"] for f in t.get("files", [])
                   if "/Orchard/Services/" in f["path"]]
          covered = sum(f["coveredLines"] for f in files)
          total = sum(f["executableLines"] for f in files)
          pct = round(100 * covered / total) if total else 0
          json.dump({"schemaVersion": 1, "label": "services coverage",
                     "message": f"{pct}%", "color": "e8590c"},
                    open("badge/coverage-badge.json", "w"))
          print(f"services coverage: {pct}% ({covered}/{total} lines)")
          EOF

      # Persist the badge JSON on gh-pages (the data store for generated files).
      # keep_files preserves appcast.xml; the deploy job below publishes the assembled
      # site (site/ + badge + appcast) via the Actions Pages path.
      - name: Persist coverage badge to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badge
          keep_files: true

  # Publish the site (with the freshly-persisted badge) via GitHub Actions Pages.
  deploy-pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/pages.yml
