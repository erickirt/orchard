name: Deploy site to GitHub Pages

# Deploys the site via the GitHub Actions Pages path (not the flaky legacy branch build).
# The static landing page lives in `site/`; the two generated files
# (coverage-badge.json, appcast.xml) are persisted on the gh-pages branch by ci.yml and
# release.yml and overlaid here, so every deploy publishes the full, current site.
#
# Triggered directly when the landing page changes, and invoked by ci.yml / release.yml
# (workflow_call) after they push their generated file, so a single job owns deployment.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_call:
    inputs:
      build_version:
        description: >-
          Commit SHA to publish as the Pages build version. Must be a real
          commit SHA — the Pages API 404s on anything else. Callers pass a
          distinct real SHA (e.g. release.yml's gh-pages appcast commit) so a
          same-source-commit redeploy isn't treated as a no-op. Defaults to the
          triggering commit when omitted.
        type: string
        required: false
        default: ""
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Queue overlapping deploys rather than letting a newer one supersede (and fail) an
    # older one — the failure mode of the previous legacy setup.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout site source
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # no git writes here; deploy uses the job token/OIDC

      - name: Fetch generated files from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _ghpages
          persist-credentials: false
        continue-on-error: true   # gh-pages may not exist on a first deploy

      # When invoked from release.yml (same run), the build job uploads the freshly-signed
      # appcast as an artifact. Prefer it over gh-pages to avoid a read-after-write race where
      # this deploy re-reads gh-pages before the release's push has propagated. Absent (CI /
      # site-only / dispatch runs), this is a no-op and we fall back to gh-pages.
      - name: Fetch freshly generated appcast (release runs only)
        uses: actions/download-artifact@v4
        with:
          name: appcast
          path: _appcast
        continue-on-error: true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R site/. _site/

          # Coverage badge: always from gh-pages (persisted by ci.yml).
          if [ -f _ghpages/coverage-badge.json ]; then
            cp _ghpages/coverage-badge.json _site/coverage-badge.json
          else
            echo "note: coverage-badge.json not on gh-pages yet — skipping"
          fi

          # Appcast: prefer this run's freshly-generated copy (race-free); else the one
          # persisted on gh-pages.
          if [ -f _appcast/appcast.xml ]; then
            echo "Using freshly generated appcast from this run"
            cp _appcast/appcast.xml _site/appcast.xml
          elif [ -f _ghpages/appcast.xml ]; then
            echo "Using appcast persisted on gh-pages"
            cp _ghpages/appcast.xml _site/appcast.xml
          else
            echo "note: no appcast available yet — skipping"
          fi

          echo "Assembled site:"; ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # We call the Pages deployments REST API directly instead of using
      # actions/deploy-pages@v4, because that action hardcodes pages_build_version to
      # GITHUB_SHA (its src/internal/context.js). GitHub Pages treats a deployment whose
      # build version equals the currently-live one as a no-op: it reports success but
      # never swaps the served content. Our release flow collides — the "Bump version"
      # commit's ci.yml run deploys that SHA first, then release.yml deploys the *same*
      # SHA (carrying the fresh appcast) minutes later and would silently no-op. So callers
      # can override the build version via the build_version input.
      #
      # The build version MUST be a real commit SHA: despite the REST docs calling it "a
      # unique string", the backend 404s on anything else (actions/deploy-pages#383).
      # release.yml passes its fresh gh-pages appcast commit SHA — distinct from ci's
      # main-branch SHA — so both deploys take effect. Every other path defaults to the
      # triggering commit, exactly what deploy-pages sent before.
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact_id }}
          BUILD_VERSION: ${{ inputs.build_version || github.sha }}
        with:
          script: |
            const artifactId = Number(process.env.ARTIFACT_ID);
            const buildVersion = process.env.BUILD_VERSION;
            const { owner, repo } = context.repo;
            const TERMINAL_FAILURES = [
              'deployment_failed',
              'deployment_content_failed',
              'deployment_cancelled',
              'deployment_lost',
            ];

            async function createDeployment() {
              const idToken = await core.getIDToken();
              const created = await github.request('POST /repos/{owner}/{repo}/pages/deployments', {
                owner,
                repo,
                artifact_id: artifactId,
                pages_build_version: buildVersion,
                oidc_token: idToken,
              });
              const deploymentId =
                created.data.id || created.data.status_url?.split('/').pop() || buildVersion;
              core.info(`Created deployment ${deploymentId} (build version ${buildVersion})`);
              if (created.data.page_url) {
                core.setOutput('page_url', created.data.page_url);
              }
              return deploymentId;
            }

            async function pollUntilDone(deploymentId) {
              // Poll until the deployment reaches a terminal state (10 min ceiling).
              // Tolerate a few consecutive transient status-query errors before giving
              // up (as deploy-pages does) — one flaky GET shouldn't abandon an otherwise
              // healthy deployment.
              let consecutiveErrors = 0;
              for (let i = 0; i < 120; i++) {
                await new Promise(r => setTimeout(r, 5000));
                let data;
                try {
                  ({ data } = await github.request(
                    'GET /repos/{owner}/{repo}/pages/deployments/{deploymentId}',
                    { owner, repo, deploymentId }
                  ));
                  consecutiveErrors = 0;
                } catch (error) {
                  if (++consecutiveErrors > 10) throw error;
                  core.warning(`Status query failed (${error.message}); ${consecutiveErrors} in a row, still polling…`);
                  continue;
                }
                core.info(`Deployment status: ${data.status}`);
                if (data.status === 'succeed') return;
                if (TERMINAL_FAILURES.includes(data.status)) {
                  throw new Error(`Deployment reached terminal failure state: ${data.status}`);
                }
              }
              throw new Error('Timed out waiting for the Pages deployment to succeed');
            }

            // Retry only the *create*: the Pages API intermittently returns a transient
            // "try again later" at creation, which clears on a second attempt. We never
            // re-POST after a deployment exists — that would duplicate an in-flight
            // deploy or re-use its build version — so once created we only poll, and a
            // poll-phase failure surfaces honestly rather than being masked by a retry.
            let deploymentId;
            try {
              deploymentId = await createDeployment();
            } catch (error) {
              core.warning(`Create failed (${error.message}); retrying once in 20s…`);
              await new Promise(r => setTimeout(r, 20000));
              deploymentId = await createDeployment();
            }
            await pollUntilDone(deploymentId);
