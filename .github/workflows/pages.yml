name: Deploy site to GitHub Pages

# Publishes the landing page (site/ + screenshots) to the gh-pages branch.
# Uses keep_files: true so it preserves appcast.xml, which is published
# separately by the release workflow.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R site/. _site/
          cp -R assets _site/assets

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
          cname: orchard.andon.dev
