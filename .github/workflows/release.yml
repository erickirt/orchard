name: Build and Release Orchard

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    # Gate releases on the test suite. Tests run on macOS 26 (see ci.yml).
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Run tests
        run: |
          xcodebuild test \
            -project Orchard.xcodeproj \
            -scheme Orchard \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  build:
    needs: test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in project settings
        run: |
          # The Info.plist is generated from build settings (GENERATE_INFOPLIST_FILE):
          #   CFBundleShortVersionString <- MARKETING_VERSION
          #   CFBundleVersion            <- CURRENT_PROJECT_VERSION
          # CFBundleVersion must increase for Sparkle to detect updates, so we use
          # the CI run number (matches sparkle:version in the appcast).
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/g" Orchard.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/g" Orchard.xcodeproj/project.pbxproj

      - name: Install Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$CERTIFICATE_P12" ]]; then
            echo "No certificate configured, skipping"
            exit 0
          fi

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build app
        run: |
          xcodebuild -project Orchard.xcodeproj \
                     -scheme Orchard \
                     -configuration Release \
                     -derivedDataPath build/ \
                     -archivePath build/Orchard.xcarchive \
                     OTHER_CODE_SIGN_FLAGS="--options=runtime" \
                     archive

      - name: Export app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_TEAM_ID" ]]; then
            cat > export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          else
            cat > export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>mac-application</string>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          EOF
          fi

          xcodebuild -exportArchive \
                     -archivePath build/Orchard.xcarchive \
                     -exportPath build/export \
                     -exportOptionsPlist export_options.plist

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R build/export/Orchard.app dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "Orchard ${{ steps.version.outputs.version }}" \
                         -srcfolder dmg_contents \
                         -ov -format UDZO \
                         "Orchard-${{ steps.version.outputs.version }}.dmg"

      - name: Notarize and staple
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "Submitting for notarization..."
            SUBMIT_OUTPUT=$(xcrun notarytool submit "Orchard-${{ steps.version.outputs.version }}.dmg" \
                                    --apple-id "$APPLE_ID" \
                                    --password "$APPLE_PASSWORD" \
                                    --team-id "$APPLE_TEAM_ID" \
                                    --wait 2>&1) || true
            echo "$SUBMIT_OUTPUT"

            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

            if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
              echo "Notarization accepted, stapling..."
              xcrun stapler staple "Orchard-${{ steps.version.outputs.version }}.dmg"
            else
              echo "Notarization failed. Fetching log..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                notarization-log.json || true
              cat notarization-log.json
              echo "::error::Notarization was not accepted. Check log above."
              exit 1
            fi
          else
            echo "Skipping notarization - secrets not configured"
          fi

      - name: Calculate checksums
        run: |
          shasum -a 256 "Orchard-${{ steps.version.outputs.version }}.dmg" > "Orchard-${{ steps.version.outputs.version }}.dmg.sha256"

      - name: Sign update and generate Sparkle appcast
        id: appcast
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          # Minimum macOS the update should be offered to (keep in sync with Requirements).
          MIN_SYSTEM_VERSION: "26.0"
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "SPARKLE_PRIVATE_KEY not set — skipping appcast generation"
            exit 0
          fi

          SPARKLE_VERSION=2.9.4
          curl -sL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar -xf sparkle.tar.xz bin/sign_update

          # Write the private key to a file and sign via --ed-key-file. (The -s
          # flag is deprecated/insecure and now exits non-zero.)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed_key"
          # sign_update prints the enclosure attributes: sparkle:edSignature="..." length="..."
          SIG=$(./bin/sign_update "Orchard-${VERSION}.dmg" --ed-key-file "$RUNNER_TEMP/sparkle_ed_key")
          rm -f "$RUNNER_TEMP/sparkle_ed_key"
          echo "Signature attributes: $SIG"

          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DL="https://github.com/andrew-waters/orchard/releases/download/v${VERSION}/Orchard-${VERSION}.dmg"
          RELEASE_URL="https://github.com/andrew-waters/orchard/releases/tag/v${VERSION}"

          # Render this version's CHANGELOG section as inline HTML so Sparkle shows the notes
          # in-panel, rather than loading the full GitHub release web page (nav/header chrome)
          # via sparkle:releaseNotesLink. Fall back to a plain link if the section is missing.
          NOTES_HTML=$(python3 .github/scripts/changelog_to_html.py "$VERSION" CHANGELOG.md || true)
          if [[ -z "$NOTES_HTML" ]]; then
            NOTES_HTML="<p>See the <a href=\"${RELEASE_URL}\">release notes</a>.</p>"
          fi

          mkdir -p _site
          cat > _site/appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>Orchard</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>${MIN_SYSTEM_VERSION}</sparkle:minimumSystemVersion>
                <link>${RELEASE_URL}</link>
                <description><![CDATA[
          ${NOTES_HTML}
          ]]></description>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="${DL}" type="application/octet-stream" ${SIG} />
              </item>
            </channel>
          </rss>
          EOF

          echo "Generated appcast:"; cat _site/appcast.xml
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchard-${{ steps.version.outputs.version }}
          path: |
            Orchard-${{ steps.version.outputs.version }}.dmg
            Orchard-${{ steps.version.outputs.version }}.dmg.sha256

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Orchard-${{ steps.version.outputs.version }}.dmg
            Orchard-${{ steps.version.outputs.version }}.dmg.sha256
          body: |
            ## Orchard v${{ steps.version.outputs.version }}

            ### Installation
            1. Download the DMG file below
            2. Open the DMG and drag Orchard.app to your Applications folder
            3. Launch Orchard from Applications

            ### Changes
            See the commit history for detailed changes in this release.

            ### Checksums
            - **SHA256**: See the `.sha256` file for verification

            ### System Requirements
            - macOS 26 (Tahoe)
            - [Apple Container](https://github.com/apple/container) installed
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist the appcast on gh-pages (the data store for generated files). keep_files
      # preserves coverage-badge.json; the deploy-pages job below publishes the assembled
      # site (site/ + badge + appcast) via the Actions Pages path.
      - name: Persist appcast to gh-pages
        if: steps.appcast.outputs.generated == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true

  # Publish the site (with the freshly-persisted appcast) via GitHub Actions Pages.
  deploy-pages:
    needs: build
    uses: ./.github/workflows/pages.yml
